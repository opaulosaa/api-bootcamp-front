version: '3.8'

services:
  backend:
    build:
      # Copy `docker/Dockerfile.backend` to your backend repo root as `Dockerfile`,
      # then set `context` to the backend repo path. Example below assumes sibling folder:
      context: ../api-node-prisma-avanti-bootcamp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3000
      # Add other env vars via .env or directly here
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:80" # mapeia porta 5173 (host) para 80 (nginx)
    depends_on:
      - backend

# Observação: por segurança, coloque variáveis sensíveis em um arquivo .env e não no compose.
