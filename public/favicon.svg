<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Mortarboard cap (flat top) -->
  <polygon points="32,14 56,24 32,34 8,24" fill="#ffffff" opacity="0.95"/>

  <!-- Cap button / top knob -->
  <circle cx="32" cy="14" r="2.5" fill="#ffd700"/>

  <!-- Tassel line -->
  <line x1="56" y1="24" x2="56" y2="38" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="56" cy="40" r="3" fill="#ffd700"/>

  <!-- Diploma tube body -->
  <rect x="20" y="34" width="24" height="16" rx="4" fill="#ffffff" opacity="0.2"/>

  <!-- Left side of graduation gown / body -->
  <path d="M22 36 Q22 50 32 52 Q42 50 42 36" fill="#ffffff" opacity="0.85"/>
</svg>
